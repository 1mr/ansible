---
- name: Copy nginx.conf
  ansible.builtin.template:
    src: nginx/nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify:
    - reload nginx

- name: Copy fastcgi_params
  ansible.builtin.template:
    src: nginx/fastcgi_params.j2
    dest: /etc/nginx/fastcgi_params
    mode: '0644'
  notify:
    - reload nginx

- name: Generate DH Parameters
  community.crypto.openssl_dhparam:
    path: /etc/ssl/private/dhparam.pem
    size: 2048

- name: Create directories
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: directory
    owner: '{{ item.owner }}'
    group: '{{ item.group }}'
    mode: '0755'
  with_items:
    - { path: /etc/nginx/vhosts, owner: root, group: root }
    - { path: /etc/nginx/streams, owner: root, group: root }
    - { path: /etc/nginx/ssl, owner: root, group: root }
    - { path: /etc/nginx/maps, owner: root, group: root }
    - { path: /etc/nginx/upstreams, owner: root, group: root }
    - { path: /var/www, owner: www-data, group: www-data }
    - { path: /var/www/default, owner: www-data, group: www-data }
    - { path: /etc/letsencrypt/renewal-hooks/post, owner: root, group: root }

- name: Create sites directory
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: 'directory'
    owner: '{{ item.owner }}'
    group: '{{ item.group }}'
    mode: '0755'
  with_items:
    - { path: /usr/sites, owner: www-data, group: www-data }
  when: nginx_sites|default(None) != None

- name: Create cache directory
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: directory
    owner: '{{ item.owner }}'
    group: '{{ item.group }}'
    mode: '0755'
  with_items:
    - { path: /var/nginxcache, owner: www-data, group: www-data }
  when: nginx_cache|default(None) != None

- name: Create index.html in /var/www/default
  ansible.builtin.lineinfile:
    dest: /var/www/default/index.html
    line: 'All-OK'
    owner: www-data
    group: www-data
    create: true
    mode: '0644'

- name: Create security.txt in /var/www/.well-known/security.txt
  ansible.builtin.lineinfile:
    dest: /var/www/.well-known/security.txt
    line: 'Contact: {{ nginx_security_contact }}'
    owner: www-data
    group: www-data
    create: true
    mode: '0644'
  when: nginx_security_contact|default(None) != None

- name: Create letsencrypt post script
  ansible.builtin.copy:
    src: letsencrypt/nginx-reload.sh
    dest: /etc/letsencrypt/renewal-hooks/post/nginx-reload.sh
    owner: root
    group: root
    mode: a+x

- name: Activate logrotate
  ansible.builtin.template:
    src: 'logrotate.d/nginx.j2'
    dest: '/etc/logrotate.d/nginx'
    mode: '0644'

- name: Change log directory owner
  ansible.builtin.file:
    path: /var/log/nginx
    state: directory
    owner: www-data
    group: adm
    mode: '0755'

- name: Change log directory files permissions
  ansible.builtin.file:
    path: /var/log/nginx
    state: directory
    owner: www-data
    group: adm
    recurse: true
