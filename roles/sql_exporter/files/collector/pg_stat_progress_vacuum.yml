collector_name: pg_stat_progress_vacuum
metrics:
  - metric_name: pg_stat_progress_vacuum_phase
    type: gauge
    help: 'Current vacuum phase (1 = active, 0 = inactive). Label "phase" is human-readable.'
    values: ['phase']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

  - metric_name: pg_stat_progress_vacuum_heap_blks_total
    type: gauge
    help: 'Total number of heap blocks in the table being vacuumed.'
    values: ['heap_blks_total']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

  - metric_name: pg_stat_progress_vacuum_heap_blks_scanned
    type: gauge
    help: 'Number of heap blocks scanned so far.'
    values: ['heap_blks_scanned']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

  - metric_name: pg_stat_progress_vacuum_heap_blks_vacuumed
    type: gauge
    help: 'Number of heap blocks vacuumed so far.'
    values: ['heap_blks_vacuumed']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

  - metric_name: pg_stat_progress_vacuum_index_vacuum
    type: gauge
    help: 'Number of completed index vacuum cycles.'
    values: ['index_vacuum']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

  - metric_name: pg_stat_progress_vacuum_max_dead_tuples
    type: gauge
    help: 'Maximum number of dead tuples that can be stored before cleanup is performed.'
    values: ['max_dead_tuples']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

  - metric_name: pg_stat_progress_vacuum_num_dead_tuples
    type: gauge
    help: 'Current number of dead tuples found so far.'
    values: ['num_dead_tuples']
    key_labels:
      - datname
      - relname
    query_ref: pg_stat_progress_vacuum

queries:
  - query_name: pg_stat_progress_vacuum
    query: |
      SELECT
        d.datname,
        s.relid::regclass::text AS relname,
        s.param1 AS phase,
        s.param2 AS heap_blks_total,
        s.param3 AS heap_blks_scanned,
        s.param4 AS heap_blks_vacuumed,
        s.param5 AS index_vacuum,
        s.param6 AS max_dead_tuples,
        s.param7 AS num_dead_tuples
      FROM
        pg_stat_get_progress_info('VACUUM'::text)
        s(pid, datid, relid, param1, param2, param3, param4, param5, param6, param7, param8, param9, param10, param11, param12, param13, param14, param15, param16, param17, param18, param19, param20)
      LEFT JOIN
        pg_database d ON s.datid = d.oid;
