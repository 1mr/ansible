---
- name: Install
  ansible.builtin.import_tasks: install.yml
  tags:
    - install_php_fpm
    - install
    - php_fpm_install

- name: Modules
  ansible.builtin.import_tasks: modules.yml
  tags:
    - modules_php_fpm
    - php_fpm_modules

- name: Configure
  ansible.builtin.import_tasks: configure.yml
  tags:
    - configure_php_fpm
    - php_fpm_configure
    - configure

- name: Pools
  ansible.builtin.import_tasks: pools.yml
  when: php_fpm_pools|lower != 'none'
  tags:
    - pools_php_fpm
    - php_fpm_pools
    - pools
